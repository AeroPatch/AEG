<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AEG – Notizen</title>

<style>

/* ===== YOUR STYLE (UNCHANGED) ===== */

:root{
  --color-primary:#cc142e;
  --color-primary-hover:#e11937;
  --bg:#f4f5f7;
  --card:#ffffff;
  --text:#1e1e1e;
  --text-light:#6e6e6e;
  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{max-width:1400px;margin:0 auto;height:100vh;}

.container-card{
  height:100vh;
  min-height:100vh;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:16px;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

h1{
  font-size:32px;
  color:var(--color-primary);
  font-weight:700;
}

.button-group{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  outline:none;
  border-radius:14px;
  padding:14px 20px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s ease;
}

.btn-secondary{background:#efefef;color:#222;}
.btn-secondary:hover{background:#dfdfdf;transform:translateY(-1px);}

.btn-danger{background:var(--color-primary);color:#fff;}
.btn-danger:hover{background:var(--color-primary-hover);transform:translateY(-1px);}

.btn-font{
  width:52px;
  min-width:52px;
  padding:14px 0;
  font-size:22px;
}

.note-wrapper{
  flex:1;
  display:flex;
  min-height:0;
}

textarea{
  flex:1;
  width:100%;
  min-height:0;
  resize:none;
  border:none;
  outline:none;
  border-radius:18px;
  padding:24px;
  background:#fafafa;
  line-height:1.7;
  border:2px solid transparent;
}

textarea:focus{
  background:#fff;
  border-color:var(--color-primary);
}

.detect-panel{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  max-height:120px;
  overflow:auto;
  padding-top:4px;
}

.detect-item{
  background:#eee;
  border-radius:12px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:14px;
}

.detect-item span{font-weight:700;}

.detect-item button{
  border:none;
  background:var(--color-primary);
  color:#fff;
  padding:4px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  font-size:13px;
  color:var(--text-light);
  flex-shrink:0;
}

</style>
</head>

<body>

<div class="app">

  <div class="container-card">

    <div class="header">

      <h1>Notizen</h1>

      <div class="button-group">

        <button class="btn btn-secondary btn-font" onclick="changeFontSize(-1)">−</button>
        <button class="btn btn-secondary btn-font" onclick="changeFontSize(1)">+</button>

        <button class="btn btn-danger" onclick="clearNote()">Notiz löschen</button>

      </div>

    </div>

    <div class="note-wrapper">
      <textarea id="noteArea" placeholder="Notizen eingeben..."></textarea>
    </div>

    <div id="detectPanel" class="detect-panel"></div>

    <div class="footer">
      <div>Automatisches Speichern aktiv</div>
      <div id="charCount">0 Zeichen</div>
    </div>

  </div>

</div>

<script>

const noteArea = document.getElementById("noteArea");
const charCount = document.getElementById("charCount");
const detectPanel = document.getElementById("detectPanel");

let currentFontSize =
  parseInt(localStorage.getItem("aeg_note_font_size")) || 16;

/* ===== REGEX (NO PREFIX ALLOWED) ===== */

const pncRegex    = /(?:^|[^0-9A-Z])(\d{9})(?=$|[^0-9A-Z])/g;
const serialRegex = /(?:^|[^0-9A-Z])(\d{8})(?=$|[^0-9A-Z])/g;
const fallRegex   = /(?:^|[^0-9A-Z])(\d{7})(?=$|[^0-9A-Z])/g;
const dateRegex   = /(?:^|[^0-9])(\d{2}\.\d{2}\.\d{4})(?=$|[^0-9])/g;

/* SAN */
const san2Regex = /(?:^|[^A-Z0-9])((BB|TA|MC|BE|HH|FM)\d{7})(?=$|[^A-Z0-9])/g;
const san1Regex = /(?:^|[^A-Z0-9])((U|P|S|E|T)\d{8})(?=$|[^A-Z0-9])/g;

/* LOAD */
window.addEventListener("load", () => {

  const saved = localStorage.getItem("aeg_consultant_note");
  if(saved) noteArea.value = saved;

  applyFontSize();
  updateCounter();
  renderDetect();
});

/* INPUT */
noteArea.addEventListener("input", () => {

  localStorage.setItem("aeg_consultant_note", noteArea.value);

  updateCounter();
  renderDetect();
});

/* FONT */
function applyFontSize(){
  noteArea.style.fontSize = currentFontSize + "px";
  localStorage.setItem("aeg_note_font_size", currentFontSize);
}

function changeFontSize(dir){
  currentFontSize += dir;

  if(currentFontSize < 12) currentFontSize = 12;
  if(currentFontSize > 32) currentFontSize = 32;

  applyFontSize();
}

/* CLEAR */
function clearNote(){

  const ok = confirm("Möchten Sie die Notiz wirklich löschen?");
  if(!ok) return;

  noteArea.value = "";
  localStorage.removeItem("aeg_consultant_note");

  updateCounter();
  renderDetect();
}

/* COUNTER */
function updateCounter(){
  charCount.textContent = `${noteArea.value.length} Zeichen`;
}

/* EXTRACT SAFE */
function extract(regex, text){
  const out = [];
  let m;
  while((m = regex.exec(text)) !== null){
    out.push(m[1]);
  }
  return [...new Set(out)];
}

/* RENDER */
function renderDetect(){

  const t = noteArea.value;

  const pnc = extract(pncRegex,t);
  const sn  = extract(serialRegex,t);
  const fall= extract(fallRegex,t);
  const date= extract(dateRegex,t);

  let san2=[], san1=[];
  let m;

  while((m = san2Regex.exec(t)) !== null) san2.push(m[1]);
  while((m = san1Regex.exec(t)) !== null) san1.push(m[1]);

  const all = [
    ["PNC", pnc],
    ["S/N", sn],
    ["Fall", fall],
    ["Datum", date],
    ["SA", san2],
    ["SA", san1]
  ];

  detectPanel.innerHTML = all
    .filter(x => x[1].length)
    .map(x => `
      <div class="detect-item">
        <span>${x[0]}: ${x[1].join(", ")}</span>
        <button onclick="copyVal('${x[1][0]}')">Kopiuj</button>
      </div>
    `)
    .join("");
}

/* COPY */
function copyVal(v){
  navigator.clipboard.writeText(v);
}

</script>

</body>
</html>
