<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AEG – Notatnik konsultanta</title>

<style>

:root{
  --color-primary:#cc142e;
  --color-primary-hover:#e11937;

  --bg:#f4f5f7;
  --card:#ffffff;

  --text:#1e1e1e;
  --text-light:#6e6e6e;

  --border:#dddddd;

  --radius:18px;

  --shadow:
    0 10px 30px rgba(0,0,0,0.08);
}

/* ===== RESET ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  height:100%;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== BODY ===== */

body{
  padding:20px;
}

/* ===== APP ===== */

.app{
  max-width:1400px;
  margin:0 auto;
}

/* ===== CARD ===== */

.container-card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);

  padding:24px;

  min-height:calc(100vh - 40px);

  display:flex;
  flex-direction:column;
  gap:20px;
}

/* ===== HEADER ===== */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.title-wrap{
  display:flex;
  flex-direction:column;
  gap:6px;
}

h1{
  font-size:32px;
  color:var(--color-primary);
  font-weight:700;
}

.subtitle{
  color:var(--text-light);
  font-size:14px;
}

/* ===== BUTTONS ===== */

.button-group{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  outline:none;

  border-radius:14px;

  padding:14px 20px;

  font-size:15px;
  font-weight:700;

  cursor:pointer;

  transition:0.2s ease;
}

/* ===== PRIMARY ===== */

.btn-primary{
  background:var(--color-primary);
  color:#fff;
}

.btn-primary:hover{
  background:var(--color-primary-hover);
  transform:translateY(-1px);
}

/* ===== SECONDARY ===== */

.btn-secondary{
  background:#efefef;
  color:#222;
}

.btn-secondary:hover{
  background:#dfdfdf;
  transform:translateY(-1px);
}

/* ===== FONT BUTTONS ===== */

.btn-font{
  width:52px;
  min-width:52px;

  padding:14px 0;

  font-size:22px;
  font-weight:700;
}

/* ===== NOTE WRAPPER ===== */

.note-wrapper{
  flex:1;
  display:flex;
}

/* ===== TEXTAREA ===== */

textarea{
  width:100%;

  min-height:650px;

  resize:vertical;

  border:none;
  outline:none;

  border-radius:18px;

  padding:24px;

  background:#fafafa;

  color:var(--text);

  line-height:1.7;

  transition:0.2s ease;

  border:2px solid transparent;
}

textarea:focus{
  background:#fff;
  border-color:var(--color-primary);
}

/* ===== FOOTER ===== */

.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:12px;
  flex-wrap:wrap;

  font-size:13px;
  color:var(--text-light);
}

/* ===== RESPONSIVE ===== */

@media (max-width:768px){

  body{
    padding:12px;
  }

  .container-card{
    padding:18px;
    min-height:calc(100vh - 24px);
  }

  h1{
    font-size:24px;
  }

  .button-group{
    width:100%;
  }

  .btn{
    flex:1;
  }

  .btn-font{
    flex:unset;
    width:52px;
  }

  textarea{
    min-height:500px;
    padding:18px;
  }
}

</style>
</head>

<body>

<div class="app">

  <div class="container-card">

    <!-- HEADER -->
    <div class="header">

      <div class="title-wrap">
        <h1>Notatnik konsultanta</h1>

        <div class="subtitle">
          Szybkie notatki podczas rozmowy z klientem
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="button-group">

        <!-- FONT DOWN -->
        <button
          class="btn btn-secondary btn-font"
          onclick="changeFontSize(-1)">
          −
        </button>

        <!-- FONT UP -->
        <button
          class="btn btn-secondary btn-font"
          onclick="changeFontSize(1)">
          +
        </button>

        <!-- SAVE -->
        <button
          class="btn btn-primary"
          onclick="saveNote()">
          Zapisz lokalnie
        </button>

        <!-- CLEAR -->
        <button
          class="btn btn-secondary"
          onclick="clearNote()">
          Wyczyść notatkę
        </button>

      </div>

    </div>

    <!-- NOTE -->
    <div class="note-wrapper">

      <textarea
        id="noteArea"
        placeholder="Wpisuj notatki z rozmowy z klientem..."
      ></textarea>

    </div>

    <!-- FOOTER -->
    <div class="footer">

      <div>
        Autozapis aktywny
      </div>

      <div id="charCount">
        0 znaków
      </div>

    </div>

  </div>

</div>

<script>

/* ===== ELEMENTS ===== */

const noteArea =
  document.getElementById("noteArea");

const charCount =
  document.getElementById("charCount");

/* ===== FONT SIZE ===== */

let currentFontSize =
  parseInt(
    localStorage.getItem("aeg_note_font_size")
  ) || 16;

/* ===== LOAD ===== */

window.addEventListener("load", () => {

  const saved =
    localStorage.getItem(
      "aeg_consultant_note"
    );

  if(saved){
    noteArea.value = saved;
  }

  applyFontSize();

  updateCounter();
});

/* ===== AUTO SAVE ===== */

noteArea.addEventListener("input", () => {

  localStorage.setItem(
    "aeg_consultant_note",
    noteArea.value
  );

  updateCounter();
});

/* ===== APPLY FONT SIZE ===== */

function applyFontSize(){

  noteArea.style.fontSize =
    currentFontSize + "px";

  localStorage.setItem(
    "aeg_note_font_size",
    currentFontSize
  );
}

/* ===== CHANGE FONT SIZE ===== */

function changeFontSize(direction){

  currentFontSize += direction;

  /* MIN */
  if(currentFontSize < 12){
    currentFontSize = 12;
  }

  /* MAX */
  if(currentFontSize > 32){
    currentFontSize = 32;
  }

  applyFontSize();
}

/* ===== SAVE ===== */

function saveNote(){

  localStorage.setItem(
    "aeg_consultant_note",
    noteArea.value
  );

  showTemporaryTitle(
    "Notatka zapisana"
  );
}

/* ===== CLEAR ===== */

function clearNote(){

  const confirmClear = confirm(
    "Czy na pewno chcesz usunąć całą notatkę?"
  );

  if(!confirmClear){
    return;
  }

  noteArea.value = "";

  localStorage.removeItem(
    "aeg_consultant_note"
  );

  updateCounter();

  showTemporaryTitle(
    "Notatka wyczyszczona"
  );
}

/* ===== COUNTER ===== */

function updateCounter(){

  const length =
    noteArea.value.length;

  charCount.textContent =
    `${length} znaków`;
}

/* ===== TEMP TITLE ===== */

function showTemporaryTitle(text){

  const original =
    document.title;

  document.title = text;

  setTimeout(() => {

    document.title = original;

  }, 1500);
}

</script>

</body>
</html>
