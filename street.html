<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Straße suchen</title>
<link rel="icon" type="image/png" href="road.png">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;

  background:
    radial-gradient(circle at top, #2f3545 0%, #1a1d24 45%, #111318 100%);

  color: #f5f7fa;

  display: flex;
  flex-direction: column;
  height: 100vh;
}

.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.box {
  width: 520px;
  padding: 35px;

  background: rgba(18, 20, 26, 0.96);

  border: 1px solid #2c3442;

  border-radius: 18px;

  box-shadow:
    0 10px 35px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.02);

  text-align: center;

  backdrop-filter: blur(10px);
}

h1 {
  margin: 0;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

h5 {
  margin-top: 8px;
  margin-bottom: 24px;

  font-weight: 500;
  font-size: 0.95rem;

  color: #9ca3af;
}

input {
  width: 100%;
  box-sizing: border-box;

  padding: 14px 16px;
  margin-bottom: 14px;

  background: #0f1117;

  border: 1px solid #2f3746;
  border-radius: 12px;

  color: #ffffff;

  font-size: 1rem;

  transition:
    border-color 0.2s,
    box-shadow 0.2s,
    background 0.2s;
}

input::placeholder {
  color: #6b7280;
}

input:focus {
  outline: none;

  border-color: #e11d48;

  background: #141824;

  box-shadow:
    0 0 0 3px rgba(225, 29, 72, 0.18);
}

.results {
  margin-top: 18px;

  text-align: left;

  max-height: 255px;

  overflow-y: auto;

  border: 1px solid #252c38;

  border-radius: 12px;

  background: #0f1117;
}

.item {
  padding: 14px 16px;

  border-bottom: 1px solid #1c2330;

  cursor: pointer;

  font-size: 0.95rem;

  color: #d1d5db;

  transition:
    background 0.15s,
    color 0.15s;
}

.item:last-child {
  border-bottom: none;
}

.item:hover {
  background: #1a2230;
  color: #ffffff;
}

.footer {
  text-align: center;

  padding: 14px;

  font-size: 0.9rem;

  color: #6b7280;
}

button {
  padding: 14px;

  flex: 1;

  background:
    linear-gradient(135deg, #e11d48 0%, #be123c 100%);

  border: none;

  border-radius: 12px;

  color: white;

  cursor: pointer;

  font-size: 0.95rem;
  font-weight: 600;

  transition:
    transform 0.15s,
    opacity 0.15s,
    box-shadow 0.15s;
}

button:hover {
  transform: translateY(-1px);

  box-shadow:
    0 8px 18px rgba(225, 29, 72, 0.25);

  opacity: 0.95;
}

button:active {
  transform: scale(0.98);
}

/* Scrollbar */
.results::-webkit-scrollbar {
  width: 10px;
}

.results::-webkit-scrollbar-track {
  background: #11151d;
  border-radius: 10px;
}

.results::-webkit-scrollbar-thumb {
  background: #374151;
  border-radius: 10px;
}

.results::-webkit-scrollbar-thumb:hover {
  background: #4b5563;
}

.toast {
  position: fixed;

  top: 30px;
  left: 50%;

  transform: translateX(-50%) translateY(-20px);

  background:
    linear-gradient(135deg, #e11d48 0%, #be123c 100%);

  color: #ffffff;

  padding: 14px 26px;

  border-radius: 12px;

  border: none;

  font-size: 0.95rem;
  font-weight: 600;

  box-shadow:
    0 8px 18px rgba(225, 29, 72, 0.25);

  opacity: 0;

  pointer-events: none;

  transition:
    opacity 0.25s ease,
    transform 0.25s ease;

  z-index: 9999;
}

.toast.show {
  opacity: 1;

  transform: translateX(-50%) translateY(0);
}

/* HELP BUTTON */

.help-btn {
  position: fixed;

  top: 20px;
  right: 20px;

  padding: 0 18px;
  height: 46px;

  border-radius: 14px;

  border: none;

  background:
    linear-gradient(135deg, #e11d48 0%, #be123c 100%);

  color: white;

  font-size: 0.95rem;
  font-weight: 700;

  cursor: pointer;

  z-index: 9999;

  box-shadow:
    0 8px 18px rgba(225, 29, 72, 0.25);

  transition:
    transform 0.15s,
    opacity 0.15s;
}

.help-btn:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

/* MODAL */

.modal {
  position: fixed;

  inset: 0;

  background: rgba(0,0,0,0.6);

  display: none;

  justify-content: center;
  align-items: center;

  z-index: 9998;

  backdrop-filter: blur(4px);
}

.modal.show {
  display: flex;
}

.modal-box {
  position: relative;

  width: 650px;

  max-width: 90%;

  background: #12141a;

  border: 1px solid #2c3442;

  border-radius: 18px;

  padding: 24px;

  color: #f5f7fa;

  box-shadow:
    0 10px 35px rgba(0,0,0,0.45);
}

.modal-box h2 {
  margin-top: 0;
  margin-bottom: 12px;

  font-size: 1.3rem;
}

.modal-box h3 {
  margin-top: 16px;
  margin-bottom: 10px;

  font-size: 1rem;
}

.modal-box p,
.modal-box li {
  font-size: 0.85rem;
  line-height: 1.45;
}

.modal-box ul {
  padding-left: 18px;
  margin-top: 8px;
  margin-bottom: 10px;
}

.modal-box li {
  margin-bottom: 6px;
  color: #d1d5db;
}

.lang-buttons button {
  padding: 8px 14px;

  flex: unset;

  font-size: 0.8rem;
  font-weight: 700;

  border-radius: 10px;

  min-width: 55px;
  
  margin-bottom: 10px;
}

/* CLOSE X */

.close-x {
  position: absolute;

  top: 14px;
  right: 14px;

  width: 38px;
  height: 38px;

  border: none;

  border-radius: 10px;

  background: #1a2230;

  color: #ffffff;

  font-size: 18px;
  font-weight: 700;

  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  line-height: 1;

  padding: 0;

  transition:
    background 0.15s,
    transform 0.15s;
}

.close-x:hover {
  background: #263043;
  transform: scale(1.05);
}

.close-x:hover {
  background: #263043;
  transform: scale(1.05);
}

.about-btn {
  position: fixed;

  top: 20px;
  right: 95px; /* przesunięcie obok INFO */

  height: 46px;
  padding: 0 14px;

  border-radius: 14px;

  border: none;

  background: #1a2230;

  color: #fff;

  font-size: 0.85rem;
  font-weight: 700;

  cursor: pointer;

  box-shadow: 0 8px 18px rgba(0,0,0,0.25);

  transition: transform 0.15s, opacity 0.15s;
}

.about-btn:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}
</style>

</head>
<body>

<div class="main">

  <div class="box">
    <h1>Straße suchen</h1>
    <h5><b>PLZ → Stadt → Straße</b></h5>

    <input id="postal" placeholder="PLZ" oninput="search()" />
    <input id="city" placeholder="Stadt" oninput="search()" />
    <input id="street" placeholder="Straße" oninput="search()" />
	
	<div style="display:flex; gap:10px; margin-bottom:10px;">
  <button onclick="clearResults()">Löschen</button>
  <button onclick="copyResults()">Kopieren</button>
</div>

    <div id="results" class="results"></div>
  </div>

</div>

<div class="footer"> © 2026 Gabriel Korzeniowski. Alle Rechte vorbehalten.</div>

<div id="toast" class="toast">Wurde kopiert!</div>

<button class="about-btn" onclick="openAbout()">ABOUT</button>
<button class="help-btn" onclick="openHelp()">INFO</button>


<div id="helpModal" class="modal">
  <div class="modal-box">

    <button class="close-x" onclick="closeHelp()">×</button>

    <div class="lang-buttons">
      <button onclick="setLang('de')">DE</button>
      <button onclick="setLang('pl')">PL</button>
    </div>

    <div id="helpContent"></div>

  </div>
</div>

<script>
let lastResults = [];

// 🔑 SUPABASE CONFIG
const SUPABASE_URL = "https://jaeywpspdodwkloghhew.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZXl3cHNwZG9kd2tsb2doaGV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTUwMTQsImV4cCI6MjA5Mjk3MTAxNH0.sPkSSmyIhL4qGTIiifnVaqj27wCpLl1_d0rubT_49D4";

let timeout;

// 🔎 SEARCH
async function search() {
  clearTimeout(timeout);

  timeout = setTimeout(async () => {

    const postal = document.getElementById("postal").value.trim();
    const city = document.getElementById("city").value.trim();
    const street = document.getElementById("street").value.trim();

    const params = new URLSearchParams();
    params.append("select", "*");

    if (postal) params.append("postalcode", `ilike.${postal}%`);
    if (city) params.append("locality", `ilike.${city}%`);
    if (street) params.append("name", `ilike.%${street}%`);

    const url = `${SUPABASE_URL}/rest/v1/streets?${params.toString()}`;

    try {
      const res = await fetch(url, {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        }
      });

      const data = await res.json();

      const box = document.getElementById("results");
      box.innerHTML = "";

      lastResults = data.slice(0, 25);

      if (!lastResults.length) {
		box.innerHTML = "<div class='item' style='font-weight:700; color:#cc142e;'>Keine Ergebnisse...</div>";
        return;
      }

      lastResults.forEach(r => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerText = `${r.name}, ${r.locality} (${r.postalcode})`;

        div.onclick = () => {
          document.getElementById("street").value = r.name;
          document.getElementById("city").value = r.locality;
          document.getElementById("postal").value = r.postalcode;
        };

        box.appendChild(div);
      });

    } catch (err) {
      console.error("ERROR:", err);
    }

  }, 200);
}

// 🧹 CLEAR (czyści inputy + wyniki)
function clearResults() {
  document.getElementById("results").innerHTML = "";
  lastResults = [];

  document.getElementById("postal").value = "";
  document.getElementById("city").value = "";
  document.getElementById("street").value = "";
}

// 📋 COPY (kopiuje inputy)
function copyResults() {
  const postal = document.getElementById("postal").value.trim();
  const city = document.getElementById("city").value.trim();
  const street = document.getElementById("street").value.trim();

  const text = `${postal}\n${city}\n${street}`;

  navigator.clipboard.writeText(text)
    .then(() => {
      const toast = document.getElementById("toast");

      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1500);
    })
    .catch(err => console.error(err));
}

const helpTexts = {

  de: `
    <h2>Wie funktioniert die Anwendung?</h2>

    <p>
      Diese Anwendung ermöglicht das schnelle Suchen deutscher Straßen
      anhand von:
    </p>

    <ul>
      <li>PLZ</li>
      <li>Stadt</li>
      <li>Straßenname</li>
    </ul>

    <h3>Funktionen</h3>

    <ul>
      <li>Live-Suche während der Eingabe</li>
      <li>Kombinierte Suche über mehrere Felder</li>
      <li>Schnelles Übernehmen eines Ergebnisses per Klick</li>
      <li>Kopieren der ausgewählten Daten</li>
      <li>Schnelles Zurücksetzen aller Felder</li>
    </ul>

    <h3>Tipps</h3>

    <ul>
      <li>Es reicht oft nur ein Teil des Namens</li>
      <li>PLZ liefert die schnellsten Ergebnisse</li>
      <li>Die Suche reagiert automatisch nach kurzer Pause</li>
      <li>Ein Klick auf einen Eintrag füllt alle Felder automatisch aus</li>
    </ul>
  `,

  pl: `
    <h2>Jak działa aplikacja?</h2>

    <p>
      Aplikacja umożliwia szybkie wyszukiwanie niemieckich ulic
      na podstawie:
    </p>

    <ul>
      <li>Kodu pocztowego</li>
      <li>Miasta</li>
      <li>Nazwy ulicy</li>
    </ul>

    <h3>Funkcjonalności</h3>

    <ul>
      <li>Wyszukiwanie na żywo podczas wpisywania</li>
      <li>Łączenie wielu filtrów jednocześnie</li>
      <li>Szybkie wybieranie wyników kliknięciem</li>
      <li>Kopiowanie wybranych danych</li>
      <li>Szybkie czyszczenie formularza</li>
    </ul>

    <h3>Wskazówki</h3>

    <ul>
      <li>Wystarczy wpisać fragment nazwy</li>
      <li>Kod pocztowy daje najszybsze wyniki</li>
      <li>Wyszukiwanie uruchamia się automatycznie po chwili</li>
      <li>Kliknięcie wyniku automatycznie uzupełnia pola</li>
    </ul>
  `
};

function openHelp() {
  document.getElementById("helpModal").classList.add("show");
  setLang("de");
}

function closeHelp() {
  document.getElementById("helpModal").classList.remove("show");
}

function setLang(lang) {
  document.getElementById("helpContent").innerHTML = helpTexts[lang];
}

function openAbout() {
  window.open("https://gabrielkorzeniowski.github.io/wizytowka/wizytowka.html", "_blank");
}
</script>

</body>
</html>
